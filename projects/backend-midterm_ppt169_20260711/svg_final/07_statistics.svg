<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#409EFF" /><stop offset="100%" stop-color="#00d4ff" />
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="#0a1628" />
  <rect x="0" y="0" width="1280" height="4" fill="url(#accentBar)" />
  <text x="60" y="52" font-family="Microsoft YaHei, sans-serif" font-size="32" font-weight="bold" fill="#409EFF">统计分析 — 四维度聚合查询</text>
  <line x1="60" y1="80" x2="1220" y2="80" stroke="#1a3050" stroke-width="1" />

  
  <path fill="#0f1d32" d="M68,110 H612 A8,8 0 0 1 620,118 V292 A8,8 0 0 1 612,300 H68 A8,8 0 0 1 60,292 V118 A8,8 0 0 1 68,110 Z" />
  <text x="80" y="140" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#e0e0e0">四个统计端点</text>
  <g font-family="Consolas, monospace" font-size="13">
    <text x="95" y="172" fill="#00d4ff">GET </text><text x="140" y="172" fill="#c0c4cc">/api/v1/statistics/overview</text><text x="420" y="172" fill="#8899aa">总览</text>
    <text x="110" y="197" fill="#8899aa">total_cases · approved_count · rejected_count · pending_count · approval_rate</text>
    <text x="95" y="225" fill="#00d4ff">GET </text><text x="140" y="225" fill="#c0c4cc">/api/v1/statistics/by-time</text><text x="420" y="225" fill="#8899aa">按日期</text>
    <text x="110" y="250" fill="#8899aa">cast(created_at as Date) 日聚合 → [{date, count}]</text>
    <text x="95" y="278" fill="#00d4ff">GET </text><text x="140" y="278" fill="#c0c4cc">/api/v1/statistics/by-type</text><text x="420" y="278" fill="#8899aa">按类型</text>
    <text x="110" y="303" fill="#8899aa">violation_type 分组 → [{violation_type, count, percentage}]</text>
  </g>

  <path fill="#0f1d32" d="M68,320 H612 A8,8 0 0 1 620,328 V402 A8,8 0 0 1 612,410 H68 A8,8 0 0 1 60,402 V328 A8,8 0 0 1 68,320 Z" />
  <text x="80" y="350" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#e0e0e0">技术特点</text>
  <g font-family="Microsoft YaHei, sans-serif" font-size="13" fill="#c0c4cc">
    <text x="95" y="378">overview 查 Case 表，其他三个查 Violation 表</text>
    <text x="95" y="401">默认时间范围 2000-01-01 ~ now · 支持 start_time/end_time 过滤</text>
  </g>

  
  <path fill="#0f1d32" d="M668,110 H1212 A8,8 0 0 1 1220,118 V352 A8,8 0 0 1 1212,360 H668 A8,8 0 0 1 660,352 V118 A8,8 0 0 1 668,110 Z" />
  <text x="685" y="140" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#00d4ff">GET /api/v1/statistics/overview</text>
  <g font-family="Consolas, monospace" font-size="12">
    <text x="685" y="175" fill="#8899aa">// 响应 200 OK</text>
    <text x="695" y="203" fill="#c0c4cc">{</text>
    <text x="710" y="228" fill="#00d4ff">"total_cases"</text><text x="860" y="228" fill="#c0c4cc">: </text><text x="870" y="228" fill="#409EFF">48</text><text x="1040" y="228" fill="#c0c4cc">,</text>
    <text x="710" y="253" fill="#00d4ff">"approved_count"</text><text x="860" y="253" fill="#c0c4cc">: </text><text x="870" y="253" fill="#67c23a">32</text><text x="1040" y="253" fill="#c0c4cc">,</text>
    <text x="710" y="278" fill="#00d4ff">"rejected_count"</text><text x="860" y="278" fill="#c0c4cc">: </text><text x="870" y="278" fill="#f56c6c">12</text><text x="1040" y="278" fill="#c0c4cc">,</text>
    <text x="710" y="303" fill="#00d4ff">"pending_count"</text><text x="860" y="303" fill="#c0c4cc">: </text><text x="870" y="303" fill="#409EFF">4</text><text x="1040" y="303" fill="#c0c4cc">,</text>
    <text x="710" y="328" fill="#00d4ff">"approval_rate"</text><text x="860" y="328" fill="#c0c4cc">: </text><text x="870" y="328" fill="#409EFF">0.667</text><text x="1040" y="328" fill="#c0c4cc">,</text>
    <text x="710" y="353" fill="#00d4ff">"period"</text><text x="860" y="353" fill="#c0c4cc">: {</text><text x="870" y="353" fill="#00d4ff">"start"</text><text x="930" y="353" fill="#c0c4cc">: </text><text x="940" y="353" fill="#67c23a">"2000-01-01"</text><text x="1040" y="353" fill="#c0c4cc">, </text><text x="1060" y="353" fill="#00d4ff">"end"</text><text x="1100" y="353" fill="#c0c4cc">: </text><text x="1110" y="353" fill="#67c23a">"2026-07-10"</text><text x="1200" y="353" fill="#c0c4cc">}</text>
    <text x="695" y="378" fill="#c0c4cc">}</text>
  </g>

  <path fill="#0f1d32" d="M668,380 H1212 A8,8 0 0 1 1220,388 V542 A8,8 0 0 1 1212,550 H668 A8,8 0 0 1 660,542 V388 A8,8 0 0 1 668,380 Z" />
  <text x="685" y="410" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#00d4ff">GET /api/v1/statistics/by-type</text>
  <g font-family="Consolas, monospace" font-size="12">
    <text x="695" y="445" fill="#c0c4cc">{ </text><text x="705" y="445" fill="#00d4ff">"items"</text><text x="780" y="445" fill="#c0c4cc">: [</text>
    <text x="705" y="470" fill="#c0c4cc">{ </text><text x="715" y="470" fill="#00d4ff">"violation_type"</text><text x="860" y="470" fill="#c0c4cc">: </text><text x="870" y="470" fill="#67c23a">"speeding"</text><text x="1000" y="470" fill="#c0c4cc">, </text><text x="1010" y="470" fill="#00d4ff">"count"</text><text x="1060" y="470" fill="#c0c4cc">: </text><text x="1070" y="470" fill="#409EFF">18</text><text x="1100" y="470" fill="#c0c4cc">, </text><text x="1110" y="470" fill="#00d4ff">"percentage"</text><text x="1200" y="470" fill="#c0c4cc">: </text><text x="1210" y="470" fill="#409EFF">56.3</text><text x="1250" y="470" fill="#c0c4cc"> }</text>
    <text x="705" y="495" fill="#c0c4cc">{ </text><text x="715" y="495" fill="#00d4ff">"violation_type"</text><text x="860" y="495" fill="#c0c4cc">: </text><text x="870" y="495" fill="#67c23a">"parking"</text><text x="1000" y="495" fill="#c0c4cc">, </text><text x="1010" y="495" fill="#00d4ff">"count"</text><text x="1060" y="495" fill="#c0c4cc">: </text><text x="1070" y="495" fill="#409EFF">8</text><text x="1100" y="495" fill="#c0c4cc">, </text><text x="1110" y="495" fill="#00d4ff">"percentage"</text><text x="1200" y="495" fill="#c0c4cc">: </text><text x="1210" y="495" fill="#409EFF">25.0</text><text x="1250" y="495" fill="#c0c4cc"> }</text>
    <text x="695" y="520" fill="#c0c4cc">] }</text>
    <text x="685" y="550" fill="#556677">→ 前端 ECharts 饼图直接消费</text>
  </g>

  <text x="1220" y="700" font-family="Consolas, monospace" font-size="12" fill="#556677" text-anchor="end">07 / 10</text>
</svg>