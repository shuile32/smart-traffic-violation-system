<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#409EFF" /><stop offset="100%" stop-color="#00d4ff" />
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="#0a1628" />
  <rect x="0" y="0" width="1280" height="4" fill="url(#accentBar)" />
  <text x="60" y="52" font-family="Microsoft YaHei, sans-serif" font-size="32" font-weight="bold" fill="#409EFF">审核工作流 — 案件审批链路</text>
  <line x1="60" y1="80" x2="1220" y2="80" stroke="#1a3050" stroke-width="1" />

  
  <path fill="#0f1d32" d="M68,110 H612 A8,8 0 0 1 620,118 V262 A8,8 0 0 1 612,270 H68 A8,8 0 0 1 60,262 V118 A8,8 0 0 1 68,110 Z" />
  <text x="80" y="140" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#e0e0e0">审核 API</text>
  <g font-family="Consolas, monospace" font-size="13">
    <text x="95" y="168" fill="#00d4ff">GET </text><text x="140" y="168" fill="#c0c4cc">/api/v1/cases</text><text x="370" y="168" fill="#8899aa">分页 + 状态/来源/关键词过滤</text>
    <text x="95" y="193" fill="#00d4ff">GET </text><text x="140" y="193" fill="#c0c4cc">/api/v1/cases/{id}</text><text x="370" y="193" fill="#8899aa">完整详情（媒体 + AI 结果）</text>
    <text x="95" y="218" fill="#00d4ff">POST</text><text x="140" y="218" fill="#c0c4cc">/api/v1/cases/{id}/approve</text><text x="370" y="218" fill="#67c23a">审核通过</text>
    <text x="95" y="243" fill="#00d4ff">POST</text><text x="140" y="243" fill="#c0c4cc">/api/v1/cases/{id}/reject</text><text x="370" y="243" fill="#f56c6c">驳回</text>
    <text x="95" y="268" fill="#00d4ff">POST</text><text x="140" y="268" fill="#c0c4cc">/api/v1/cases/{id}/request-recheck</text><text x="370" y="268" fill="#8899aa">AI 重检(stub)</text>
  </g>

  <path fill="#0f1d32" d="M68,290 H612 A8,8 0 0 1 620,298 V452 A8,8 0 0 1 612,460 H68 A8,8 0 0 1 60,452 V298 A8,8 0 0 1 68,290 Z" />
  <text x="80" y="320" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#e0e0e0">审核通过后的自动化链</text>
  <g font-family="Microsoft YaHei, sans-serif" font-size="13" fill="#c0c4cc">
    <text x="95" y="350">1. approve 写入 plate_no / violation_type / review_opinion</text>
    <text x="95" y="375">2. 创建 Violation (violation_no = VIO{date}{id:06d})</text>
    <text x="95" y="400">3. 查找 Vehicle → 获取 Owner → 查询 email</text>
    <text x="95" y="425">4. 填充 notification_template → SMTP 发送邮件</text>
    <text x="95" y="450">5. 若为 citizen 举报 → grant Reward (固定金额)</text>
  </g>

  <path fill="#0f1d32" d="M68,480 H612 A8,8 0 0 1 620,488 V552 A8,8 0 0 1 612,560 H68 A8,8 0 0 1 60,552 V488 A8,8 0 0 1 68,480 Z" />
  <text x="80" y="510" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#e0e0e0">容错策略</text>
  <g font-family="Microsoft YaHei, sans-serif" font-size="13" fill="#8899aa">
    <text x="95" y="535">通知失败不阻断归档 · 无车主 → violation 依然创建 · 所有操作写入 AuditLog</text>
    <text x="95" y="558">任何未完结状态 (uploaded/detecting/ai_reviewing) 均可直接审核</text>
  </g>

  
  <path fill="#0f1d32" d="M668,110 H1212 A8,8 0 0 1 1220,118 V362 A8,8 0 0 1 1212,370 H668 A8,8 0 0 1 660,362 V118 A8,8 0 0 1 668,110 Z" />
  <text x="685" y="140" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#00d4ff">POST /api/v1/cases/{id}/approve</text>
  <g font-family="Consolas, monospace" font-size="12">
    <text x="685" y="170" fill="#8899aa">// 请求</text>
    <text x="695" y="195" fill="#c0c4cc">{</text>
    <text x="710" y="218" fill="#00d4ff">"plate_no"</text><text x="830" y="218" fill="#c0c4cc">: </text><text x="840" y="218" fill="#67c23a">"粤B-TEST01"</text><text x="1040" y="218" fill="#c0c4cc">,</text>
    <text x="710" y="241" fill="#00d4ff">"violation_type"</text><text x="830" y="241" fill="#c0c4cc">: </text><text x="840" y="241" fill="#67c23a">"speeding"</text><text x="1040" y="241" fill="#c0c4cc">,</text>
    <text x="710" y="264" fill="#00d4ff">"fine_amount"</text><text x="830" y="264" fill="#c0c4cc">: </text><text x="840" y="264" fill="#409EFF">200</text><text x="1040" y="264" fill="#c0c4cc">,</text>
    <text x="710" y="287" fill="#00d4ff">"points"</text><text x="830" y="287" fill="#c0c4cc">: </text><text x="840" y="287" fill="#409EFF">3</text><text x="1040" y="287" fill="#c0c4cc">,</text>
    <text x="710" y="310" fill="#00d4ff">"review_opinion"</text><text x="830" y="310" fill="#c0c4cc">: </text><text x="840" y="310" fill="#67c23a">"超速属实"</text>
    <text x="695" y="333" fill="#c0c4cc">}</text>
    <text x="685" y="360" fill="#8899aa">// 响应 200 OK</text>
  </g>

  <path fill="#0f1d32" d="M668,390 H1212 A8,8 0 0 1 1220,398 V552 A8,8 0 0 1 1212,560 H668 A8,8 0 0 1 660,552 V398 A8,8 0 0 1 668,390 Z" />
  <text x="685" y="415" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#8899aa">// approve 响应</text>
  <g font-family="Consolas, monospace" font-size="12">
    <text x="695" y="445" fill="#c0c4cc">{</text>
    <text x="710" y="468" fill="#00d4ff">"violation_no"</text><text x="860" y="468" fill="#c0c4cc">: </text><text x="870" y="468" fill="#67c23a">"VIO20260710000002"</text><text x="1090" y="468" fill="#c0c4cc">,</text>
    <text x="710" y="491" fill="#00d4ff">"notification_status"</text><text x="860" y="491" fill="#c0c4cc">: </text><text x="870" y="491" fill="#f56c6c">"pending"</text><text x="1090" y="491" fill="#c0c4cc">,</text>
    <text x="710" y="514" fill="#00d4ff">"reward_id"</text><text x="860" y="514" fill="#c0c4cc">: </text><text x="870" y="514" fill="#409EFF">1</text>
    <text x="695" y="537" fill="#c0c4cc">}</text>
    <text x="685" y="565" fill="#556677">→ reject 只需 {"reject_reason":"证据不足"} → 200 OK</text>
  </g>

  <text x="1220" y="700" font-family="Consolas, monospace" font-size="12" fill="#556677" text-anchor="end">05 / 10</text>
</svg>