<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#409EFF" /><stop offset="100%" stop-color="#00d4ff" />
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="#0a1628" />
  <rect x="0" y="0" width="1280" height="4" fill="url(#accentBar)" />
  <text x="60" y="52" font-family="Microsoft YaHei, sans-serif" font-size="32" font-weight="bold" fill="#409EFF">图片摄入 — 三来源接入 + 安全机制</text>
  <line x1="60" y1="80" x2="1220" y2="80" stroke="#1a3050" stroke-width="1" />

  
  <path fill="#0f1d32" d="M68,110 H612 A8,8 0 0 1 620,118 V182 A8,8 0 0 1 612,190 H68 A8,8 0 0 1 60,182 V118 A8,8 0 0 1 68,110 Z" />
  <text x="80" y="140" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#e0e0e0">市民随手拍</text>
  <g font-family="Microsoft YaHei, sans-serif" font-size="13" fill="#c0c4cc">
    <text x="95" y="163">POST /api/v1/intakes/citizen-reports · citizen JWT · 描述+地点+图片</text>
    <text x="95" y="183">→ 审核通过后发放奖励</text>
  </g>

  <path fill="#0f1d32" d="M68,205 H612 A8,8 0 0 1 620,213 V277 A8,8 0 0 1 612,285 H68 A8,8 0 0 1 60,277 V213 A8,8 0 0 1 68,205 Z" />
  <text x="80" y="235" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#e0e0e0">管理员手动上传</text>
  <g font-family="Microsoft YaHei, sans-serif" font-size="13" fill="#c0c4cc">
    <text x="95" y="258">POST /api/v1/intakes/admin-uploads · admin/reviewer JWT</text>
    <text x="95" y="278">→ 用于补充证据、测试等场景</text>
  </g>

  <path fill="#0f1d32" d="M68,300 H612 A8,8 0 0 1 620,308 V372 A8,8 0 0 1 612,380 H68 A8,8 0 0 1 60,372 V308 A8,8 0 0 1 68,300 Z" />
  <text x="80" y="330" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#e0e0e0">摄像头自动推送</text>
  <g font-family="Microsoft YaHei, sans-serif" font-size="13" fill="#c0c4cc">
    <text x="95" y="353">POST /api/v1/intakes/camera-captures · X-Camera-Key 头鉴权</text>
    <text x="95" y="373">→ SHA-256(Key) 比对 · 可附加车速 · 吊销后 401</text>
  </g>

  <path fill="#0f1d32" d="M68,400 H612 A8,8 0 0 1 620,408 V522 A8,8 0 0 1 612,530 H68 A8,8 0 0 1 60,522 V408 A8,8 0 0 1 68,400 Z" />
  <text x="80" y="430" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#e0e0e0">安全防护</text>
  <g font-family="Microsoft YaHei, sans-serif" font-size="13" fill="#c0c4cc">
    <text x="95" y="456">🔐 SHA-256 图片哈希去重 → 相同图片返回 409</text>
    <text x="95" y="479">🛡️ Magic Byte MIME 校验 → 非 JPEG/PNG/WebP 返回 400</text>
    <text x="95" y="502">📏 单文件上限 10MB · 单次单文件上传</text>
    <text x="95" y="525">🔑 API Key 只存哈希，原始密钥仅返回一次</text>
  </g>

  
  <path fill="#0f1d32" d="M668,110 H1212 A8,8 0 0 1 1220,118 V422 A8,8 0 0 1 1212,430 H668 A8,8 0 0 1 660,422 V118 A8,8 0 0 1 668,110 Z" />
  <text x="685" y="140" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#00d4ff">POST /api/v1/intakes/citizen-reports</text>
  <g font-family="Consolas, monospace" font-size="12">
    <text x="685" y="175" fill="#8899aa">// Content-Type: multipart/form-data</text>
    <text x="685" y="200" fill="#8899aa">// image: evidence.jpg (JPEG, 245KB)</text>
    <text x="685" y="225" fill="#8899aa">// location_text: "深圳市南山区科技园"</text>
    <text x="685" y="255" fill="#8899aa">// 响应 200 OK</text>
    <text x="695" y="282" fill="#c0c4cc">{</text>
    <text x="710" y="305" fill="#00d4ff">"case_id"</text><text x="810" y="305" fill="#c0c4cc">: </text><text x="820" y="305" fill="#409EFF">3</text><text x="835" y="305" fill="#c0c4cc">,</text>
    <text x="710" y="328" fill="#00d4ff">"case_no"</text><text x="810" y="328" fill="#c0c4cc">: </text><text x="820" y="328" fill="#67c23a">"CASE20260710000003"</text><text x="1040" y="328" fill="#c0c4cc">,</text>
    <text x="710" y="351" fill="#00d4ff">"status"</text><text x="810" y="351" fill="#c0c4cc">: </text><text x="820" y="351" fill="#f56c6c">"uploaded"</text><text x="1040" y="351" fill="#c0c4cc">,</text>
    <text x="710" y="374" fill="#00d4ff">"message"</text><text x="810" y="374" fill="#c0c4cc">: </text><text x="820" y="374" fill="#67c23a">"图片已接收，等待处理"</text>
    <text x="695" y="397" fill="#c0c4cc">}</text>
    <text x="685" y="425" fill="#556677">→ 相同图片再次上传返回 409 Conflict</text>
  </g>

  <path fill="#0f1d32" d="M668,450 H1212 A8,8 0 0 1 1220,458 V542 A8,8 0 0 1 1212,550 H668 A8,8 0 0 1 660,542 V458 A8,8 0 0 1 668,450 Z" />
  <text x="685" y="480" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#00d4ff">摄像头鉴权测试</text>
  <g font-family="Consolas, monospace" font-size="12">
    <text x="685" y="510" fill="#c0c4cc">X-Camera-Key: sk-a1b2c3... → 200 OK (case created)</text>
    <text x="685" y="535" fill="#c0c4cc">X-Camera-Key: (revoked) → 401 Unauthorized</text>
  </g>

  <text x="1220" y="700" font-family="Consolas, monospace" font-size="12" fill="#556677" text-anchor="end">04 / 10</text>
</svg>