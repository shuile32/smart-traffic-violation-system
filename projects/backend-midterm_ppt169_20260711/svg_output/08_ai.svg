<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#409EFF"/><stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="#0a1628"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#accentBar)"/>
  <text x="60" y="52" font-family="Microsoft YaHei, sans-serif" font-size="32" font-weight="bold" fill="#409EFF">AI 接口层 — 适配器模式</text>
  <line x1="60" y1="80" x2="1220" y2="80" stroke="#1a3050" stroke-width="1"/>

  <!-- Left -->
  <rect x="60" y="110" width="560" height="230" fill="#0f1d32" rx="8"/>
  <text x="80" y="140" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#e0e0e0">四个 AI 端点</text>
  <g font-family="Consolas, monospace" font-size="13">
    <text x="95" y="172" fill="#00d4ff">POST</text><text x="140" y="172" fill="#c0c4cc">/internal/ai/yolo/detect</text><text x="390" y="172" fill="#f56c6c">YOLOv8 检测</text>
    <text x="110" y="197" fill="#8899aa">上传图片 → 返回车辆/车牌 bbox + confidence</text>
    <text x="95" y="225" fill="#00d4ff">POST</text><text x="140" y="225" fill="#c0c4cc">/internal/ai/ocr/plate</text><text x="390" y="225" fill="#f56c6c">OCR 车牌</text>
    <text x="95" y="253" fill="#00d4ff">POST</text><text x="140" y="253" fill="#c0c4cc">/internal/ai/rules/evaluate</text><text x="390" y="253" fill="#f56c6c">规则判定</text>
    <text x="110" y="278" fill="#8899aa">检测结果 + OCR + 车辆信息 + 规则 → 证据链</text>
    <text x="95" y="306" fill="#00d4ff">POST</text><text x="140" y="306" fill="#c0c4cc">/internal/ai/review/text</text><text x="390" y="306" fill="#f56c6c">LLM 初审</text>
    <text x="110" y="331" fill="#8899aa">综合所有证据 → suggest_approve / need_review</text>
  </g>

  <rect x="60" y="360" width="560" height="200" fill="#0f1d32" rx="8"/>
  <text x="80" y="390" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#e0e0e0">适配器模式</text>
  <g font-family="Consolas, monospace" font-size="12" fill="#c0c4cc">
    <text x="95" y="420"><tspan fill="#8899aa"># adapters/base.py — ABC 抽象接口</tspan></text>
    <text x="95" y="445"><tspan fill="#5b8def">class</tspan><tspan fill="#00d4ff"> YoloDetector</tspan><tspan fill="#e0e0e0">(ABC):</tspan></text>
    <text x="110" y="468"><tspan fill="#5b8def">@abstractmethod</tspan></text>
    <text x="110" y="491"><tspan fill="#5b8def">def</tspan><tspan fill="#00d4ff"> detect</tspan><tspan fill="#e0e0e0">(self, image_path) -> </tspan><tspan fill="#409EFF">DetectionResult</tspan><tspan fill="#e0e0e0">: ...</tspan></text>
    <text x="95" y="520"><tspan fill="#8899aa"># adapters/stub.py — Stub 实现</tspan></text>
    <text x="95" y="545"><tspan fill="#5b8def">class</tspan><tspan fill="#00d4ff"> StubYoloDetector</tspan><tspan fill="#e0e0e0">(YoloDetector):</tspan></text>
  </g>

  <!-- Right: JSON -->
  <rect x="660" y="110" width="560" height="240" fill="#0f1d32" rx="8"/>
  <text x="685" y="140" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#00d4ff">POST /internal/ai/yolo/detect</text>
  <g font-family="Consolas, monospace" font-size="12">
    <text x="685" y="175" fill="#8899aa">// multipart/form-data → image</text>
    <text x="685" y="205" fill="#c0c4cc">{</text>
    <text x="700" y="230" fill="#00d4ff">"objects"</text><text x="790" y="230" fill="#c0c4cc">: [{</text>
    <text x="720" y="255" fill="#00d4ff">"class"</text><text x="790" y="255" fill="#c0c4cc">: </text><text x="800" y="255" fill="#67c23a">"car"</text><text x="1000" y="255" fill="#c0c4cc">,</text>
    <text x="720" y="280" fill="#00d4ff">"bbox"</text><text x="790" y="280" fill="#c0c4cc">: [100,200,300,350],</text>
    <text x="720" y="305" fill="#00d4ff">"confidence"</text><text x="790" y="305" fill="#c0c4cc">: </text><text x="800" y="305" fill="#409EFF">0.92</text>
    <text x="700" y="330" fill="#c0c4cc">}],</text>
    <text x="700" y="330" fill="#00d4ff">"model_version"</text><text x="830" y="330" fill="#c0c4cc">: </text><text x="840" y="330" fill="#67c23a">"stub-yolov8n"</text>
    <text x="685" y="355" fill="#c0c4cc">}</text>
  </g>

  <rect x="660" y="370" width="560" height="180" fill="#0f1d32" rx="8"/>
  <text x="685" y="400" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#00d4ff">POST /internal/ai/review/text</text>
  <g font-family="Consolas, monospace" font-size="12">
    <text x="685" y="435" fill="#8899aa">// JSON body — 综合所有证据</text>
    <text x="695" y="465" fill="#c0c4cc">{</text>
    <text x="710" y="490" fill="#00d4ff">"conclusion"</text><text x="830" y="490" fill="#c0c4cc">: </text><text x="840" y="490" fill="#67c23a">"suggest_approve"</text><text x="1040" y="490" fill="#c0c4cc">,</text>
    <text x="710" y="515" fill="#00d4ff">"confidence"</text><text x="830" y="515" fill="#c0c4cc">: </text><text x="840" y="515" fill="#409EFF">0.88</text><text x="1040" y="515" fill="#c0c4cc">,</text>
    <text x="710" y="540" fill="#00d4ff">"reason"</text><text x="830" y="540" fill="#c0c4cc">: </text><text x="840" y="540" fill="#67c23a">"车速80，限速60，超速33%"</text>
    <text x="695" y="565" fill="#c0c4cc">}</text>
  </g>

  <text x="1220" y="700" font-family="Consolas, monospace" font-size="12" fill="#556677" text-anchor="end">08 / 10</text>
</svg>