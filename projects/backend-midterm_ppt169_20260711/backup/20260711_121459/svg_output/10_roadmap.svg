  <!-- Summary bar -->
  <rect x="60" y="540" width="1160" height="120" fill="#0f1d32" rx="8"/>
  <text x="80" y="580" font-family="Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#00d4ff">当前完成度</text>
  <g font-family="Microsoft YaHei, sans-serif" font-size="16">
