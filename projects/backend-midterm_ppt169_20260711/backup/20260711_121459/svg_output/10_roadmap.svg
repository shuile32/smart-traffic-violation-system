    <rect x="660" y="335" width="560" height="70" fill="#0f1d32" rx="8"/>
    <circle cx="690" cy="370" r="12" fill="#5b8def"/>
    <text x="690" y="375" font-family="Consolas, monospace" font-size="14" fill="#ffffff" font-weight="bold" text-anchor="middle">3</text>
