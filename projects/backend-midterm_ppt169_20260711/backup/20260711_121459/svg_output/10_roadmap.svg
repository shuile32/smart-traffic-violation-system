    <text x="715" y="381" font-size="12" fill="#8899aa">驾驶员 /admin/drivers · 角色 /admin/roles · 公告系统</text>

    <rect x="660" y="415" width="560" height="70" fill="#0f1d32" rx="8"/>
    <circle cx="690" cy="450" r="12" fill="#8899aa"/>
    <text x="690" y="455" font-family="Consolas, monospace" font-size="14" fill="#ffffff" font-weight="bold" text-anchor="middle">4</text>
    <text x="715" y="438" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#e0e0e0">终期答辩准备（3周后）</text>
    <text x="715" y="461" font-size="12" fill="#8899aa">全功能联调 + API 文档定稿 + 部署上线</text>
